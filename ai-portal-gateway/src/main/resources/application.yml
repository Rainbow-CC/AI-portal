server:
  port: 8080

spring:
  application:
    name: ai-portal-gateway
  codec:
    max-in-memory-size: 10MB
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      httpserver:
        accesslog: true
      routes:
        - id: ai-service-route
          uri: ${AI_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/v1/ai/**,/api/chat/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 150
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@apiKeyResolver}"
            - name: CircuitBreaker
              args:
                name: aiCircuitBreaker
                fallbackUri: forward:/fallback

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.ai.portal.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

resilience4j:
  circuitbreaker:
    instances:
      aiCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      aiCircuitBreaker:
        timeoutDuration: 60s

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"
